<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="In-House Goal Setting & Tracking Portal — Create, align, track, and review employee goals with quarterly check-ins and real-time dashboards.">
  <title>GoalSync — Goal Setting & Tracking Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- LOGIN PAGE -->
  <div class="login-page" id="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon">⚡</div>
          <h1>GoalSync</h1>
          <p>Goal Setting & Tracking Portal</p>
        </div>

        <form id="login-form" onsubmit="return App.handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="login-email" placeholder="Enter your email" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <div class="login-error" id="login-error">
            <span>⚠</span><span id="login-error-text">Invalid credentials</span>
          </div>
          <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
        </form>

        <div class="login-divider">or quick access</div>

        <div class="login-users" id="login-users">
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="login-footer">
        <p>Demo credentials — use any password to sign in</p>
      </div>
    </div>
  </div>

  <!-- APP LAYOUT (hidden until login) -->
  <div class="app-layout hidden" id="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>GoalSync</h1>
          <div style="font-size:0.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase">Tracking Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div style="padding:16px;border-top:1px solid var(--border)">
        <button class="btn btn-danger btn-sm" style="width:100%" onclick="if(confirm('Reset all data to defaults?')){DataStore.resetDB();App.navigate('dashboard');showToast('Data reset','info')}">
          Reset Demo Data
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="topbar-title">Dashboard</h2>
        </div>
        <div class="topbar-right" id="topbar-user"></div>
      </header>
      <div class="content-area" id="content">
        <!-- Dynamic content loads here -->
      </div>
    </main>
  </div>

  <!-- Scripts (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/employee.js"></script>
  <script src="js/manager.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
